<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" data-alt="A moody, high-contrast cinematic shot of an MMA fighter's silhouette shadow boxing in a dark, atmospheric gym. Deep shadows dominate the scene, punctuated by subtle, cool blue and harsh white edge lighting highlighting the athlete's muscular definition and motion. The aesthetic is gritty, technical, and intensely focused, serving as a backdrop for a modern data-driven interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuChuPWci63xDzk2kJw5GeINNtCAUi5oCXbL0_FvBPuSmnLnXToZyjLUnXsFaSU5EICdrrGrVm767mUafISCRVBo1_1f8PxLAbqPY-nTY0cMTHfOBYKS2bN0y-33h1AGfUFoXKAhusGeYzueAM7Qlu047fcKX8fBkK49mGKgymJuFikh30tQe__AcmwcZzy3w-cIuIt0OAXemW1HxvLp2EO-x1e-8rwxH9c63uZWV1OgMsD8D1tj7JcCEr_F15OTJR7aO6aeHFuKkCk');">
</div>
<!-- Heavy Gradient Overlay for legibility and brand color integration -->
<div class="absolute inset-0 z-0 bg-gradient-to-b from-surface/90 via-surface/80 to-surface/95 backdrop-blur-[4px]"></div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Header / Logo -->
<div class="text-center mb-10 flex flex-col items-center">
<span class="material-symbols-outlined text-secondary text-5xl mb-4 drop-shadow-[0_0_15px_rgba(158,202,255,0.4)]" style="font-variation-settings: 'FILL' 1;">
                analytics
            </span>
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg italic tracking-tighter text-secondary drop-shadow-md">
                STRIKE_LAB
            </h1>
<p class="font-body-md text-body-md text-text-secondary mt-2 tracking-wide uppercase text-sm">
                Clinical Combat Performance
            </p>
</div>
<!-- Glassmorphism Form Card -->
<div class="bg-surface-container/60 backdrop-blur-xl border border-border-muted rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
<!-- Subtle accent glow inside card -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary to-transparent opacity-50"></div>
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-text-secondary" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-lg">mail</span>
</div>
<input class="w-full bg-surface-lowest/50 border border-border-muted rounded-lg py-3 pl-10 pr-4 text-text-primary placeholder:text-border-muted focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all bg-surface/40" id="email" name="email" placeholder="fighter@strikelab.ai" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-stack-sm">
<div class="flex items-center justify-between">
<label class="block font-label-md text-label-md text-text-secondary" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors text-xs" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-lg">lock</span>
</div>
<input class="w-full bg-surface-lowest/50 border border-border-muted rounded-lg py-3 pl-10 pr-4 text-text-primary placeholder:text-border-muted focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all bg-surface/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-3.5 rounded-lg bg-secondary text-on-secondary font-headline-md text-headline-md shadow-[0_4px_12px_rgba(158,202,255,0.2)] hover:bg-primary transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2" type="submit">
                    INITIATE SESSION
                    <span class="material-symbols-outlined text-xl">login</span>
</button>
</form>
<!-- Divider -->
<div class="mt-8 mb-6 flex items-center justify-center">
<div class="border-t border-border-muted flex-grow"></div>
<span class="px-4 bg-transparent text-text-secondary font-label-md text-label-md text-xs uppercase tracking-widest">Or access via</span>
<div class="border-t border-border-muted flex-grow"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-border-muted bg-surface/30 hover:bg-surface-bright transition-colors text-text-secondary hover:text-text-primary font-label-md text-label-md" type="button">
<span class="material-symbols-outlined text-lg">account_circle</span>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-2.5 rounded-lg border border-border-muted bg-surface/30 hover:bg-surface-bright transition-colors text-text-secondary hover:text-text-primary font-label-md text-label-md" type="button">
<span class="material-symbols-outlined text-lg">devices</span>
                    Apple
                </button>
</div>
</div>

<p class="font-body-md text-body-md text-text-secondary text-sm">

</p>
